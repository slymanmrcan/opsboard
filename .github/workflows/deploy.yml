name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Container Publish"]
    types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Latest Container
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
          DEPLOY_CONTAINER_NAME: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          DEPLOY_HOST_PORT: ${{ secrets.DEPLOY_HOST_PORT }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          envs: IMAGE,DEPLOY_CONTAINER_NAME,DEPLOY_HOST_PORT,DEPLOY_ENV_FILE,GHCR_USERNAME,GHCR_READ_TOKEN
          script: |
            set -euo pipefail

            CONTAINER_NAME="${DEPLOY_CONTAINER_NAME:-opsboard}"
            HOST_PORT="${DEPLOY_HOST_PORT:-4008}"
            ENV_FILE="${DEPLOY_ENV_FILE:-/opt/opsboard/.env}"

            if [ ! -f "$ENV_FILE" ]; then
              echo "Env file not found: $ENV_FILE"
              exit 1
            fi

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE"

            if docker ps -a --format '{{.Names}}' | grep -E "^${CONTAINER_NAME}$" >/dev/null 2>&1; then
              docker rm -f "$CONTAINER_NAME"
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$HOST_PORT:3000" \
              --env-file "$ENV_FILE" \
              "$IMAGE"

            docker image prune -f
